name: Update Profile Data

on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # 🕹️  Pac-Man contribution animation
  # ─────────────────────────────────────────
  pacman:
    name: Generate Pac-Man Animation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hugoalh/ghaction-setup-ghtoken@v1
        id: ghtoken
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Pac-Man SVG
        uses: zanderxyz/pacman-contribution-graph@main
        with:
          github-user: joasmelo
          output-path: dist/github-contribution-grid-snake.svg   # mantém o caminho original para não quebrar o README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback — Snake (se Pac-Man falhar)
        if: failure()
        uses: Platane/snk@v3
        with:
          github_user_name: joasmelo
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
