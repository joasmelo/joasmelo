name: Update Profile Data

on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours (fixed cron syntax)
  workflow_dispatch:           # Manual trigger via GitHub UI

jobs:
  # ─────────────────────────────────────────
  # 🐍  Snake contribution animation
  # ─────────────────────────────────────────
  snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: joasmelo
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # 📊  Update README stats (optional extra)
  # ─────────────────────────────────────────
  update-readme:
    name: Update README Timestamps
    runs-on: ubuntu-latest
    needs: snake
    steps:
      - uses: actions/checkout@v4

      - name: Verify README exists
        run: |
          echo "✅ Profile README found:"
          head -5 README.md
